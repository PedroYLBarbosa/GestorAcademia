<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Gestor Academia</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 flex items-center justify-center min-h-screen font-sans text-slate-300">

    <section class="w-full max-w-md bg-slate-800 p-8 rounded-xl shadow-2xl border border-slate-700">
        
        <h1 class="text-2xl font-bold text-emerald-400 text-center mb-6 flex items-center justify-center gap-2">
        💪LOGIN💪
        </h1>
        
        <form id="loginForm" onsubmit="realizarLogin(event)" class="space-y-5">
            
            <div>
                <label for="CPF" class="block text-sm font-medium text-slate-400 mb-1">CPF</label>
                <input 
                    type="text" 
                    id="CPF" 
                    required
                    class="w-full px-4 py-2 bg-slate-700 border border-slate-600 rounded-lg text-slate-200 placeholder-slate-500 focus:ring-2 focus:ring-emerald-400 focus:border-emerald-400 outline-none transition-all"
                    placeholder="000.000.000-00"
                >
            </div>
            
            <div>
                <label for="password" class="block text-sm font-medium text-slate-400 mb-1">SENHA</label>
                <input 
                    type="password" 
                    id="password" 
                    required
                    class="w-full px-4 py-2 bg-slate-700 border border-slate-600 rounded-lg text-slate-200 placeholder-slate-500 focus:ring-2 focus:ring-emerald-400 focus:border-emerald-400 outline-none transition-all"
                    placeholder="********"
                >
            </div>
            
            <button 
                type="submit"
                class="w-full bg-emerald-400 hover:bg-emerald-500 text-slate-900 font-bold py-2.5 rounded-lg transition-colors duration-200 mt-4 shadow-lg shadow-emerald-500/20"
            >
                ENTRAR  
            </button>
            
        </form>
    </section>
    <script>
        async function realizarLogin(event) {

            event.preventDefault();

            // Captura os valores digitados nos inputs
            const cpfDigitado = document.getElementById('CPF').value;
            const senhaDigitada = document.getElementById('password').value;

            try {
                // Faz a requisição POST para a sua rota no Node.js
                const resposta = await fetch('https://api-gestor-academia.onrender.com/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },

                    body: JSON.stringify({ 
                        cpf: cpfDigitado, 
                        senha: senhaDigitada 
                    })
                });

                const dados = await resposta.json();

                if (dados.sucesso) {
                
                localStorage.setItem('usuarioId', dados.usuario.id_usuario);
                localStorage.setItem('usuarioNome', dados.usuario.nome); 
                localStorage.setItem('usuarioTipo', dados.usuario.tipo_usuario);
                const tipoUsuario = dados.usuario.tipo_usuario; // "aluno" ou instrutor" ou "gerente"
                    
                    if (tipoUsuario === "Aluno") {
                        window.location.href = 'aluno.html';
                    } else if (tipoUsuario === "Instrutor") {
                        window.location.href = 'instrutor.html';
                    } else if (tipoUsuario === "Gerente") {
                        window.location.href = 'gerente.html';
                    } 
                    else {
                        alert("Tipo de usuário desconhecido.");
                    }
                } else {

                    alert(dados.mensagem);
                }

            } catch (erro) {
                console.error("Erro na requisição:", erro);
                alert("Erro ao tentar conectar com o servidor. Verifique se o Node.js está rodando.");
            }
        }
    </script>
</body>
</html>
